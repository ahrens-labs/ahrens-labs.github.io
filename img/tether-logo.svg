<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Tether">
  <defs>
    <linearGradient id="tether-blue" x1="6" y1="58" x2="58" y2="6" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1e40af"/>
      <stop offset="0.55" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="tether-shine" x1="32" y1="8" x2="32" y2="36" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="tether-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#1e3a8a" flood-opacity="0.35"/>
    </filter>
  </defs>
  <g filter="url(#tether-shadow)">
    <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#tether-blue)"/>
    <ellipse cx="32" cy="22" rx="24" ry="14" fill="url(#tether-shine)"/>
    <!-- T crossbar with tether caps -->
    <rect x="11" y="16" width="42" height="10" rx="5" fill="#ffffff"/>
    <circle cx="11" cy="21" r="5" fill="#60a5fa"/>
    <circle cx="53" cy="21" r="5" fill="#60a5fa"/>
    <!-- T stem -->
    <rect x="27" y="16" width="10" height="32" rx="5" fill="#ffffff"/>
    <!-- junction knot -->
    <circle cx="32" cy="21" r="4" fill="#2563eb"/>
  </g>
</svg>
