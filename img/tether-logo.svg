<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Tether">
  <defs>
    <linearGradient id="th-navy" x1="12" y1="10" x2="34" y2="34" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2b4f9e"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="th-navy-hi" x1="14" y1="12" x2="28" y2="26" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5b7fd4" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#5b7fd4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="th-blue" x1="32" y1="28" x2="32" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5b9cf8"/>
      <stop offset="1" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="th-blue-hi" x1="24" y1="34" x2="40" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#bfdbfe" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#bfdbfe" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="th-check" x1="20" y1="20" x2="46" y2="46" gradientUnits="userSpaceOnUse">
      <stop stop-color="#e0f2fe"/>
      <stop offset="0.35" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#0369a1"/>
    </linearGradient>
    <filter id="th-shadow" x="6" y="6" width="54" height="54" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.35" flood-color="#0f172a" flood-opacity="0.26"/>
    </filter>
  </defs>
  <g filter="url(#th-shadow)">
    <!-- interlocking links (triangular tether) -->
    <path
      d="M 10.5 27.5
         C 10.5 12, 26.5 6, 32 18.5
         C 35 26.5, 29.5 32, 24 29"
      stroke="url(#th-navy)"
      stroke-width="6.75"
      stroke-linecap="round"
      fill="none"/>
    <path
      d="M 53.5 27.5
         C 53.5 12, 37.5 6, 32 18.5
         C 29 26.5, 34.5 32, 40 29"
      stroke="url(#th-navy)"
      stroke-width="6.75"
      stroke-linecap="round"
      fill="none"/>
    <path
      d="M 16 40.5
         C 24 54.5, 40 54.5, 48 40.5
         C 40 26.5, 24 26.5, 16 40.5"
      stroke="url(#th-blue)"
      stroke-width="6.75"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"/>
    <!-- woven check -->
    <path
      d="M 20.5 33.5
         L 29 42
         L 44.5 23.5"
      stroke="url(#th-check)"
      stroke-width="5.5"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"/>
    <!-- edge highlights -->
    <path
      d="M 13 24 C 13 15, 22 10, 28 18"
      stroke="url(#th-navy-hi)"
      stroke-width="2.25"
      stroke-linecap="round"
      fill="none"/>
    <path
      d="M 51 24 C 51 15, 42 10, 36 18"
      stroke="url(#th-navy-hi)"
      stroke-width="2.25"
      stroke-linecap="round"
      fill="none"/>
    <path
      d="M 20 38 C 26 48, 38 48, 44 38"
      stroke="url(#th-blue-hi)"
      stroke-width="2.25"
      stroke-linecap="round"
      fill="none"/>
  </g>
</svg>
