<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Tether">
  <defs>
    <linearGradient id="t-blue" x1="32" y1="8" x2="32" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3b82f6"/>
      <stop offset="0.55" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="t-glow" x1="32" y1="10" x2="32" y2="30" gradientUnits="userSpaceOnUse">
      <stop stop-color="#93c5fd" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#93c5fd" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- tether arc under the crossbar -->
  <path d="M12 28 Q32 46 52 28" stroke="#60a5fa" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.85"/>
  <!-- T crossbar -->
  <rect x="10" y="12" width="44" height="13" rx="6.5" fill="url(#t-blue)"/>
  <rect x="10" y="12" width="44" height="8" rx="6.5" fill="url(#t-glow)"/>
  <!-- anchor nodes -->
  <circle cx="10" cy="18.5" r="6.5" fill="#1e40af"/>
  <circle cx="54" cy="18.5" r="6.5" fill="#1e40af"/>
  <circle cx="10" cy="17" r="2" fill="#93c5fd" opacity="0.5"/>
  <circle cx="54" cy="17" r="2" fill="#93c5fd" opacity="0.5"/>
  <!-- T stem -->
  <rect x="24" y="18" width="16" height="36" rx="8" fill="url(#t-blue)"/>
  <rect x="26" y="20" width="6" height="14" rx="3" fill="#93c5fd" opacity="0.35"/>
</svg>
