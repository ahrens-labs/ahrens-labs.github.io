<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Tether">
  <defs>
    <linearGradient id="tether-bg" x1="8" y1="56" x2="56" y2="8" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#tether-bg)"/>
  <!-- T crossbar -->
  <rect x="13" y="17" width="38" height="9" rx="2.5" fill="#ffffff"/>
  <!-- T stem -->
  <rect x="27.5" y="17" width="9" height="30" rx="2.5" fill="#ffffff"/>
  <!-- tether anchor nodes on the crossbar -->
  <circle cx="13" cy="21.5" r="5.5" fill="#ea580c"/>
  <circle cx="51" cy="21.5" r="5.5" fill="#ea580c"/>
  <circle cx="13" cy="21.5" r="2.2" fill="#fff7ed" opacity="0.45"/>
  <circle cx="51" cy="21.5" r="2.2" fill="#fff7ed" opacity="0.45"/>
