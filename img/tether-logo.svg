<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Tether">
  <defs>
    <linearGradient id="tether-grad" x1="12" y1="12" x2="52" y2="52" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4f46e5"/>
      <stop offset="0.5" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="tether-shine" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="tether-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#4f46e5" flood-opacity="0.35"/>
    </filter>
  </defs>
  <g filter="url(#tether-glow)">
    <rect x="11" y="23" width="18" height="18" rx="9" stroke="url(#tether-grad)" stroke-width="4.5" fill="none" transform="rotate(-42 20 32)"/>
    <rect x="35" y="23" width="18" height="18" rx="9" stroke="url(#tether-grad)" stroke-width="4.5" fill="none" transform="rotate(42 44 32)"/>
  </g>
  <circle cx="20" cy="32" r="3" fill="url(#tether-shine)" opacity="0.9"/>
  <circle cx="44" cy="32" r="3" fill="url(#tether-shine)" opacity="0.9"/>
</svg>
