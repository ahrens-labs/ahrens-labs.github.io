<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Yellow chain-link sides (filled rings) + hollow plate outline in center -->
  <defs>
    <linearGradient id="plYellow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="55%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
  </defs>

  <!-- Left chain loop -->
  <path
    fill="url(#plYellow)"
    fill-rule="evenodd"
    stroke="#a16207"
    stroke-width="10"
    stroke-linejoin="round"
    d="M 52 256
       c 0 -62 38 -100 96 -100
       s 96 38 96 100
       s -38 100 -96 100
       s -96 -38 -96 -100
       z
       M 102 256
       c 0 32 20 52 46 52
       s 46 -20 46 -52
       s -20 -52 -46 -52
       s -46 20 -46 52
       z"/>

  <!-- Right chain loop -->
  <path
    fill="url(#plYellow)"
    fill-rule="evenodd"
    stroke="#a16207"
    stroke-width="10"
    stroke-linejoin="round"
    d="M 268 256
       c 0 -62 38 -100 96 -100
       s 96 38 96 100
       s -38 100 -96 100
       s -96 -38 -96 -100
       z
       M 318 256
       c 0 32 20 52 46 52
       s 46 -20 46 -52
       s -20 -52 -46 -52
       s -46 20 -46 52
       z"/>

  <!-- Plate: yellow outline only (open center) -->
  <circle
    cx="256"
    cy="256"
    r="78"
    fill="none"
    stroke="#a16207"
    stroke-width="22"/>
  <circle
    cx="256"
    cy="256"
    r="78"
    fill="none"
    stroke="url(#plYellow)"
    stroke-width="14"/>
  <!-- Inner rim hint -->
  <circle
    cx="256"
    cy="256"
    r="54"
    fill="none"
    stroke="#a16207"
    stroke-width="5"
    opacity="0.85"/>
  <circle
    cx="256"
    cy="256"
    r="54"
    fill="none"
    stroke="#facc15"
    stroke-width="3"/>

  <!-- Tiny steak mark in open plate space -->
  <g transform="translate(256 256) rotate(-18)">
    <rect
      x="-22"
      y="-16"
      width="44"
      height="32"
      rx="9"
      fill="none"
      stroke="#a16207"
      stroke-width="7"/>
    <rect
      x="-22"
      y="-16"
      width="44"
      height="32"
      rx="9"
      fill="none"
      stroke="#facc15"
      stroke-width="4"/>
    <path
      d="M -8 -2 h 16 M -8 6 h 16"
      stroke="#a16207"
      stroke-width="3.5"
      stroke-linecap="round"/>
  </g>
</svg>
