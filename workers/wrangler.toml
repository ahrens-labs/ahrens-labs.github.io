name = "chess-accounts"
main = "src/index.js"
compatibility_date = "2024-01-01"

[durable_objects]
bindings = [
  { name = "USER_ACCOUNT", class_name = "UserAccount", script_name = "chess-accounts" },
  { name = "SESSION", class_name = "Session", script_name = "chess-accounts" },
  { name = "USERNAME_REGISTRY", class_name = "UsernameRegistry", script_name = "chess-accounts" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["UserAccount", "Session"]

[[migrations]]
tag = "v2"
renamed_classes = []
deleted_classes = []

[[migrations]]
tag = "v3"
new_sqlite_classes = ["UsernameRegistry"]

# Outbound email via Cloudflare Email Service (domain must be onboarded in dashboard → Email Sending).
[[send_email]]
name = "EMAIL"
remote = true

[vars]
# Must be an address on a domain onboarded for Email Sending in Cloudflare (same account as this Worker).
VERIFICATION_FROM_EMAIL = "noreply@example.com"
# Origin used in the verification link (no trailing slash).
VERIFICATION_LINK_BASE = "https://ahrens-labs.github.io"
# Path that handles ?verify= & email= (e.g. account.html or /chess_engine.html).
VERIFICATION_LANDING_PATH = "/account.html"
# JWT_SECRET will be set via wrangler secret put
