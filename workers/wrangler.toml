name = "chess-accounts"
main = "src/index.js"
compatibility_date = "2024-01-01"

[durable_objects]
bindings = [
  { name = "USER_ACCOUNT", class_name = "UserAccount", script_name = "chess-accounts" },
  { name = "SESSION", class_name = "Session", script_name = "chess-accounts" },
  { name = "USERNAME_REGISTRY", class_name = "UsernameRegistry", script_name = "chess-accounts" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["UserAccount", "Session"]

[[migrations]]
tag = "v2"
renamed_classes = []
deleted_classes = []

[[migrations]]
tag = "v3"
new_sqlite_classes = ["UsernameRegistry"]

# Outbound email (pick one):
#
# A) Workers FREE — Resend (recommended): verify your domain at resend.com, then:
#    wrangler secret put RESEND_API_KEY
#    SENDER_EMAIL below must be an address/domain you verified in Resend.
#
# B) Cloudflare Email Service — requires Workers PAID plan + dashboard Email Sending onboarding.
#    Uncomment [[send_email]]; SENDER_EMAIL must match allowed_sender_addresses and your onboarded zone.
#
# [[send_email]]
# name = "EMAIL"
# allowed_sender_addresses = ["matt@ahrenslabs.com"]
# remote = true

[vars]
# Verified sender (Resend or, if using paid Email Service, your onboarded domain).
SENDER_EMAIL = "matt@ahrenslabs.com"
# Origin used in the verification link (no trailing slash).
VERIFICATION_LINK_BASE = "https://ahrens-labs.github.io"
# Path that handles ?verify= & email= (e.g. account.html or /chess_engine.html).
VERIFICATION_LANDING_PATH = "/account.html"
# JWT_SECRET will be set via wrangler secret put
