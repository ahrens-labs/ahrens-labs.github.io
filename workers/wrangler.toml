# chess-accounts — deploy: cd workers && npx wrangler deploy
# Email: same pattern as sports-digest — Cloudflare Email Sending domain onboarded; SENDER_EMAIL on that domain.
# Do not set allowed_destination_addresses here (unlike sports-digest): this worker must mail arbitrary user addresses
# (signup verify, password reset). Sports-digest only emails RECIPIENT_EMAIL so it can lock destinations.
# Workers Free: Cloudflare Email Sending may be unavailable; use wrangler secret put RESEND_API_KEY (see src/index.js).

name = "chess-accounts"
main = "src/index.js"
compatibility_date = "2025-05-01"

[durable_objects]
bindings = [
  { name = "USER_ACCOUNT", class_name = "UserAccount", script_name = "chess-accounts" },
  { name = "SESSION", class_name = "Session", script_name = "chess-accounts" },
  { name = "USERNAME_REGISTRY", class_name = "UsernameRegistry", script_name = "chess-accounts" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["UserAccount", "Session"]

[[migrations]]
tag = "v2"
renamed_classes = []
deleted_classes = []

[[migrations]]
tag = "v3"
new_sqlite_classes = ["UsernameRegistry"]

[[send_email]]
name = "EMAIL"
remote = true

[vars]
# Onboarded domain address (Cloudflare Email Sending) or Resend-verified address if using RESEND_API_KEY only.
SENDER_EMAIL = "matt@ahrenslabs.com"
# Origin used in the verification link (no trailing slash).
VERIFICATION_LINK_BASE = "https://ahrens-labs.github.io"
# Path that handles ?verify= & email= (e.g. account.html or /chess_engine.html).
VERIFICATION_LANDING_PATH = "/account.html"
# JWT_SECRET will be set via wrangler secret put
