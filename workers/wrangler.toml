name = "chess-accounts"
main = "src/index.js"
compatibility_date = "2024-01-01"

[durable_objects]
bindings = [
  { name = "USER_ACCOUNT", class_name = "UserAccount", script_name = "chess-accounts" },
  { name = "SESSION", class_name = "Session", script_name = "chess-accounts" },
  { name = "USERNAME_REGISTRY", class_name = "UsernameRegistry", script_name = "chess-accounts" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["UserAccount", "Session"]

[[migrations]]
tag = "v2"
renamed_classes = []
deleted_classes = []

[[migrations]]
tag = "v3"
new_sqlite_classes = ["UsernameRegistry"]

# Outbound email: same as Dashboard → chess-accounts worker → Bindings → Email Service named EMAIL.
# Code uses env.EMAIL.send(). Keep this block in wrangler.toml so `wrangler deploy` does not drop the binding.
# 1) Email Sending: onboard a real zone (DNS on Cloudflare); From address cannot be @*.workers.dev.
# 2) SENDER_EMAIL must match [[send_email]] allowed_sender_addresses (onboarded domain in Email Sending).
[[send_email]]
name = "EMAIL"
allowed_sender_addresses = ["matt@ahrenslabs.com"]
remote = true

[vars]
# Plaintext Worker variable; same value can be set in the dashboard instead of here.
SENDER_EMAIL = "matt@ahrenslabs.com"
# Origin used in the verification link (no trailing slash).
VERIFICATION_LINK_BASE = "https://ahrens-labs.github.io"
# Path that handles ?verify= & email= (e.g. account.html or /chess_engine.html).
VERIFICATION_LANDING_PATH = "/account.html"
# JWT_SECRET will be set via wrangler secret put
