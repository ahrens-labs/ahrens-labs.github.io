# chess-accounts — deploy: cd workers && npx wrangler deploy
# Email: same pattern as sports-digest — Cloudflare Email Sending domain onboarded; SENDER_EMAIL on that domain.
# Admin broadcast (/api/admin/broadcast-email) sends from caleb@ahrenslabs.com — that address must be verified with your provider too.
# Do not set allowed_destination_addresses here (unlike sports-digest's test inbox lock): this worker must mail arbitrary user addresses.
# Cloudflare path: [[send_email]] name = EMAIL_TRANSACTIONAL → env.EMAIL_TRANSACTIONAL.send({ from: { email, name }, to, subject, html, text }).
# (signup verify, password reset). Sports-digest only emails RECIPIENT_EMAIL so it can lock destinations.
# Debug send (like sports-digest): wrangler secret put TEST_SECRET
#   curl -sS -X POST "https://<this-worker-host>/send-test" -H "Content-Type: application/json" \
#     -H "X-Test-Secret: <secret>" -d '{"to":"your@email.com"}'
# If Cloudflare keeps returning E_RECIPIENT_NOT_ALLOWED, set TRANSACTIONAL_EMAIL_VIA = "resend" below and run:
#   wrangler secret put RESEND_API_KEY
# (SENDER_EMAIL must be a domain verified in Resend when using that mode.)

name = "chess-accounts"
main = "src/index.js"
compatibility_date = "2025-05-01"

# Daily chess challenge digest subscribers (Cron → email). Binding name must match env.DAILY_DIGEST_KV in code.
[[kv_namespaces]]
binding = "DAILY_DIGEST_KV"
id = "64db75c8a01b42229806b59cb30cae80"

# Daily digest: runs every hour at minute 53 UTC — each subscriber is emailed when *their* local wall time matches DIGEST_SEND_LOCAL_* (below).
# For 3:53 PM local test: hour 15, minute 53, cron minute 53. For midnight local: use 0, 0 and crons = ["0 * * * *"].
# Confirm Triggers in the Cloudflare dashboard; if the cron never runs, scheduled digests won’t send.
[triggers]
crons = ["53 * * * *"]

[durable_objects]
bindings = [
  { name = "USER_ACCOUNT", class_name = "UserAccount", script_name = "chess-accounts" },
  { name = "SESSION", class_name = "Session", script_name = "chess-accounts" },
  { name = "USERNAME_REGISTRY", class_name = "UsernameRegistry", script_name = "chess-accounts" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["UserAccount", "Session"]

[[migrations]]
tag = "v2"
renamed_classes = []
deleted_classes = []

[[migrations]]
tag = "v3"
new_sqlite_classes = ["UsernameRegistry"]

# Use binding name EMAIL_TRANSACTIONAL (not "EMAIL") so a dashboard allowlist stuck on an old EMAIL binding does not apply.
# Must NOT set allowed_destination_addresses or destination_address — those cause E_RECIPIENT_NOT_ALLOWED for arbitrary users.
# Omit `remote = true` on deployed Workers (that flag is for wrangler dev hitting real Email Service). Add it back only for local dev if needed.
[[send_email]]
name = "EMAIL_TRANSACTIONAL"

[vars]
# Local time in each subscriber’s digestTimeZone when the scheduled daily challenge email is sent (24h clock).
DIGEST_SEND_LOCAL_HOUR = "15"
DIGEST_SEND_LOCAL_MINUTE = "53"
# From address — must be allowed by Cloudflare Email Sending and/or Resend (same domain ok if root domain is verified).
SENDER_EMAIL = "caleb@ahrenslabs.com"
# Set to "resend" to skip Cloudflare Email send entirely (needs RESEND_API_KEY). Fixes stubborn E_RECIPIENT_NOT_ALLOWED from account/dashboard allowlists.
# TRANSACTIONAL_EMAIL_VIA = "resend"
# Optional display name on the From header for Cloudflare Email Service (default "Ahrens Labs").
# TRANSACTIONAL_FROM_NAME = "Ahrens Labs"
# Public website for links in welcome/digest emails (no trailing slash).
PUBLIC_SITE_BASE = "https://ahrenslabs.com"
# Origin used in signup verification & password-reset links in email (no trailing slash).
VERIFICATION_LINK_BASE = "https://ahrenslabs.com"
# Path that handles ?verify=&email= (signup confirmation).
VERIFICATION_LANDING_PATH = "/account.html"
# Path that handles ?reset=&email= (password reset from email).
PASSWORD_RESET_LANDING_PATH = "/reset-password.html"
# JWT_SECRET will be set via wrangler secret put
