<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delete Account - Ahrens Labs</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/x-icon" href="/img/favicon.ico">
  <script src="js/script.js"></script>
  <style>
    .delete-wrap {
      max-width: 560px;
      margin: 40px auto;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }
    .delete-wrap h1 { margin: 0 0 14px 0; color: #1f2937; }
    .danger-text { color: #7f1d1d; line-height: 1.5; }
    .form-group { margin-top: 18px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #334155; }
    .form-group input {
      width: 100%; box-sizing: border-box; padding: 12px 14px;
      border: 1px solid #cbd5e1; border-radius: 10px; font-size: 1rem;
    }
    .row { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
    .btn {
      border: 0; border-radius: 10px; padding: 12px 16px;
      font-weight: 700; cursor: pointer;
    }
    .btn-danger { background: #dc2626; color: #fff; }
    .btn-secondary { background: #e2e8f0; color: #1f2937; }
    .note { color: #64748b; font-size: 0.9rem; margin-top: 10px; }
    .status { min-height: 1.2em; margin-top: 12px; font-size: 0.9rem; }
  </style>
</head>
<body>
  <main class="delete-wrap">
    <h1>Delete account</h1>
    <p class="danger-text">
      This action is permanent. It deletes your account and all cloud data
      (chess progress, dungeon saves, Classify planner data, and Kyrachyng lessons).
    </p>

    <div class="form-group">
      <label for="delete-password">Enter your password to confirm</label>
      <input id="delete-password" type="password" autocomplete="off" autocapitalize="none" autocorrect="off">
    </div>

    <div class="row">
      <button id="delete-btn" class="btn btn-danger" type="button">Delete my account permanently</button>
      <button class="btn btn-secondary" type="button" onclick="window.location.href='account.html?manage=1'">Cancel</button>
    </div>
    <p class="note">You will receive a final email confirmation after successful deletion.</p>
    <p id="status" class="status" aria-live="polite"></p>
  </main>

  <script>
    const API_BASE_URL =
      window.AHRENS_LABS_API_BASE || 'https://chess-accounts.matthewahrens.workers.dev';

    function setStatus(msg, isError) {
      const el = document.getElementById('status');
      if (!el) return;
      el.textContent = msg || '';
      el.style.color = isError ? '#b91c1c' : '#065f46';
    }

    async function deleteAccountNow() {
      const sessionId = localStorage.getItem('ahrenslabs_sessionId');
      const password = document.getElementById('delete-password').value || '';
      if (!sessionId) {
        setStatus('Please log in first.', true);
        window.location.href = 'account.html';
        return;
      }
      if (!password) {
        setStatus('Enter your password to continue.', true);
        return;
      }
      if (!window.confirm('Delete your account permanently? This cannot be undone.')) return;

      setStatus('Deleting account...', false);
      try {
        const response = await fetch(`${API_BASE_URL}/api/delete-account`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${sessionId}`,
          },
          body: JSON.stringify({ password }),
        });

        const data = await response.json().catch(() => ({}));
        if (response.ok && data.success) {
          localStorage.removeItem('ahrenslabs_sessionId');
          localStorage.removeItem('ahrenslabs_username');
          localStorage.removeItem('ahrenslabs_userId');
          localStorage.removeItem('ahrenslabs_email');
          setStatus('Account deleted. Redirecting...', false);
          setTimeout(() => { window.location.href = 'index.html'; }, 900);
          return;
        }

        const msg = data.error || (response.status === 404
          ? 'Delete endpoint missing. Deploy the chess-accounts Worker.'
          : 'Could not delete account.');
        setStatus(msg, true);
      } catch (error) {
        console.error(error);
        setStatus('Could not delete account. Please try again.', true);
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('delete-btn');
      if (btn) btn.addEventListener('click', () => { void deleteAccountNow(); });
    });
  </script>
</body>
</html>
