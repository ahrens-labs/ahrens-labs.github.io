<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found — Ahrens Labs</title>
  <script>
    (function () {
      var path = window.location.pathname || '';
      var m = path.match(/^\/chess-replay\/([^/]+)\/?$/);
      if (m && m[1]) {
        window.location.replace('/chess-replay.html?id=' + encodeURIComponent(decodeURIComponent(m[1])));
        return;
      }
    })();
  </script>
</head>
<body style="font-family: system-ui, sans-serif; padding: 2rem; text-align: center;">
  <h1>Page not found</h1>
  <p><a href="index.html">Return home</a></p>
</body>
</html>
