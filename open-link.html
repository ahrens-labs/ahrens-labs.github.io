<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link — Ahrens Labs</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/x-icon" href="/img/favicon.ico">
  <script src="js/script.js"></script>
  <script src="js/header_nav.js"></script>
  <style>
    .link-launch {
      max-width: 28rem;
      margin: 4rem auto;
      padding: 2rem;
      text-align: center;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      box-shadow: 0 8px 28px rgba(15, 23, 42, 0.06);
      font-family: system-ui, -apple-system, sans-serif;
    }
    .link-launch h1 { margin: 0 0 0.5rem; font-size: 1.5rem; color: #0f172a; }
    .link-launch p { margin: 0; color: #64748b; line-height: 1.5; }
    .link-launch .err { color: #b91c1c; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="wrapper">
    <header>
      <div class="header-content">
        <a href="index.html" class="logo-link">
          <img src="img/EagleLogo.png" alt="Ahrens Labs logo" class="header-logo">
        </a>
        <h1>Ahrens Labs</h1>
        <nav>
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="labs.html">Labs &amp; Projects</a></li>
            <li><a href="coding-lab.html">Coding Lab</a></li>
            <li><a href="account-dashboard.html">Account</a></li>
          </ul>
        </nav>
        <div id="header-auth-buttons" style="position:absolute;top:10px;right:10px;display:flex;gap:8px;align-items:center;z-index:1000;">
          <button id="header-login-btn" type="button" onclick="window.location.href='account.html?return=open-link.html'" style="padding:6px 14px;background:#3498db;color:white;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:0.85em;">Login</button>
          <button id="header-signup-btn" type="button" onclick="window.location.href='account.html?return=open-link.html'" style="padding:6px 14px;background:#2ecc71;color:white;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:0.85em;">Sign Up</button>
          <span id="header-username" style="display:none;padding:6px 14px;color:white;font-weight:600;font-size:0.9em;"></span>
        </div>
      </div>
    </header>
    <main class="content">
      <div class="link-launch">
        <h1>Opening Link…</h1>
        <p id="link-status">Signing you in with your Ahrens Labs account.</p>
        <p id="link-error" class="err" hidden></p>
      </div>
    </main>
    <div class="push"></div>
  </div>
  <footer>
    <p>&copy; 2025 Ahrens Labs. All rights reserved. · <a href="contact.html">Contact</a> · <a href="privacy.html">Privacy</a></p>
  </footer>
  <script>
    (async function () {
      const statusEl = document.getElementById('link-status');
      const errEl = document.getElementById('link-error');
      const sessionId = localStorage.getItem('ahrenslabs_sessionId');

      if (!sessionId) {
        window.location.href = 'account.html?return=open-link.html';
        return;
      }

      try {
        // Skip bridge if Link session cookie already present (avoids re-bridge on refresh).
        if (document.cookie.split(';').some(function (c) { return c.trim().indexOf('session=') === 0; })) {
          window.location.href = '/link/dashboard';
          return;
        }

        const res = await fetch(window.AHRENS_LABS_API_BASE + '/api/link/bridge', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + sessionId,
            'Content-Type': 'application/json',
          },
        });
        const data = await res.json().catch(function () { return {}; });
        if (!res.ok || !data.url) {
          throw new Error(data.error || 'Could not open Link');
        }
        statusEl.textContent = 'Redirecting to Link…';
        window.location.href = data.url;
      } catch (e) {
        statusEl.textContent = 'Could not open Link.';
        errEl.hidden = false;
        errEl.textContent = e.message || String(e);
      }
    })();
  </script>
</body>
</html>
