# Deploy Link CRM worker when workers/link-crm changes.
name: Deploy Link worker

on:
  push:
    branches: [main]
    paths:
      - 'workers/link-crm/**'
  workflow_dispatch:

env:
  CLOUDFLARE_ACCOUNT_ID: 67e1b6f34b4b7cf8ed0d354dc5b2e9c7

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: workers/link-crm/package-lock.json
      - name: Install dependencies
        working-directory: workers/link-crm
        run: npm ci
      - name: Deploy Link worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 67e1b6f34b4b7cf8ed0d354dc5b2e9c7
          command: deploy
          workingDirectory: workers/link-crm
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 67e1b6f34b4b7cf8ed0d354dc5b2e9c7
