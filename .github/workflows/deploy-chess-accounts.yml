# Deploy Cloudflare Worker (chess-accounts) when workers/ changes.
# REQUIRED: same CLOUDFLARE_API_TOKEN secret as deploy-pages.yml
# Local fallback: cd workers && npx wrangler deploy
name: Deploy chess-accounts worker

on:
  push:
    branches: [main]
    paths:
      - 'workers/**'
      - '.github/workflows/deploy-chess-accounts.yml'
  workflow_dispatch:

env:
  CLOUDFLARE_ACCOUNT_ID: 67e1b6f34b4b7cf8ed0d354dc5b2e9c7

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 67e1b6f34b4b7cf8ed0d354dc5b2e9c7
          workingDirectory: workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 67e1b6f34b4b7cf8ed0d354dc5b2e9c7
