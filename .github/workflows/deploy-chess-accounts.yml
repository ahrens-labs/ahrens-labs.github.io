# Deploy Cloudflare Worker (chess-accounts) when workers/ changes.
# REQUIRED: same CLOUDFLARE_API_TOKEN secret as deploy-pages.yml
#   Additional permission: Workers Scripts Edit
# Local fallback: cd workers && npx wrangler deploy
name: Deploy chess-accounts worker

on:
  push:
    branches: [main]
    paths:
      - 'workers/**'
      - '.github/workflows/deploy-chess-accounts.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: workers
