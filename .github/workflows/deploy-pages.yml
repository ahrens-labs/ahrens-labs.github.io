# Deploy static site to Cloudflare Pages (ahrenslabs.com).
# Requires repo secret CLOUDFLARE_API_TOKEN (Account:Read, Cloudflare Pages:Edit).
name: Deploy Cloudflare Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'workers/**'
      - '.github/workflows/deploy-chess-accounts.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy . --project-name=ahrens-labs-github-io --branch=main
