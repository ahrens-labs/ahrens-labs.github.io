# Deploy static site to Cloudflare Pages (ahrenslabs.com).
# REQUIRED: GitHub repo secret CLOUDFLARE_API_TOKEN
#   Create at https://dash.cloudflare.com/profile/api-tokens
#   Permissions: Account Read, Cloudflare Pages Edit (project ahrens-labs-github-io)
# Without it, pushes to main will not update ahrenslabs.com — deploy locally:
#   npx wrangler pages deploy . --project-name=ahrens-labs-github-io --branch=main
name: Deploy Cloudflare Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'workers/**'
      - '.github/workflows/deploy-chess-accounts.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy . --project-name=ahrens-labs-github-io --branch=main
