# Deploy static site to Cloudflare Pages (ahrenslabs.com).
# REQUIRED: GitHub repo secret CLOUDFLARE_API_TOKEN
#   Create at https://dash.cloudflare.com/profile/api-tokens
#   Permissions: Account Read, Cloudflare Pages Edit, Workers Scripts Edit
# Account tokens also need accountId below (wrangler skips /memberships lookup).
# Local fallback: npx wrangler pages deploy . --project-name=ahrens-labs-github-io --branch=main
name: Deploy Cloudflare Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'workers/**'
      - '.github/workflows/deploy-chess-accounts.yml'
  workflow_dispatch:

env:
  CLOUDFLARE_ACCOUNT_ID: 67e1b6f34b4b7cf8ed0d354dc5b2e9c7

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 67e1b6f34b4b7cf8ed0d354dc5b2e9c7
          command: pages deploy . --project-name=ahrens-labs-github-io --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 67e1b6f34b4b7cf8ed0d354dc5b2e9c7
