<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game history — TrifangX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="icon" type="image/x-icon" href="/img/favicon.ico" />
  <style>
    body.gh-body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #f0f4f8 0%, #e8f2f7 50%, #f0f4f8 100%);
      background-attachment: fixed;
      color: #333;
      font-family: "Inter", system-ui, sans-serif;
    }
    .gh-top-nav {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      padding: 12px 20px;
      background: rgba(255, 255, 255, 0.92);
      border-bottom: 1px solid #e2e8f0;
      box-shadow: 0 1px 8px rgba(15, 23, 42, 0.06);
    }
    .gh-top-nav a {
      color: #2980b9;
      font-weight: 600;
      text-decoration: none;
      font-size: 0.95rem;
    }
    .gh-top-nav a:hover {
      text-decoration: underline;
    }
    .gh-page-main {
      max-width: 900px;
      margin: 0 auto;
      padding: max(16px, env(safe-area-inset-top, 0px)) max(20px, env(safe-area-inset-right, 0px))
        max(28px, env(safe-area-inset-bottom, 0px)) max(20px, env(safe-area-inset-left, 0px));
      box-sizing: border-box;
      background: linear-gradient(165deg, #ffffff 0%, #f1f5f9 55%, #e8ecf1 100%);
      min-height: calc(100vh - 56px);
      border-radius: 0 0 16px 16px;
      box-shadow: 0 8px 32px rgba(15, 23, 42, 0.08);
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .gh-page-main > .settings-header {
      margin-bottom: 12px;
      padding-bottom: 12px;
      flex-shrink: 0;
    }
    .gh-page-main > p,
    .gh-page-main > .gh-filters {
      flex-shrink: 0;
    }
    .settings-header {
      border-bottom: 3px solid #e9ecef;
    }
    .settings-header h2 {
      margin: 0;
      color: #2c3e50;
      font-family: "Inter", sans-serif;
    }
    #game-history-list {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .game-history-row {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      background: #fff;
      border: 1px solid #dbe2ea;
      border-radius: 14px;
      font-family: "Inter", sans-serif;
      font-size: 0.9rem;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.05), 0 6px 20px rgba(15, 23, 42, 0.06);
    }
    .game-history-row.game-history-row--win {
      border-left: 4px solid #27ae60;
      background: linear-gradient(90deg, rgba(39, 174, 96, 0.1) 0%, #fff 14px);
    }
    .game-history-row.game-history-row--loss {
      border-left: 4px solid #e74c3c;
      background: linear-gradient(90deg, rgba(231, 76, 60, 0.1) 0%, #fff 14px);
    }
    .game-history-row.game-history-row--draw {
      border-left: 4px solid #7f8c8d;
      background: linear-gradient(90deg, rgba(127, 140, 141, 0.1) 0%, #fff 14px);
    }
    .game-history-row-meta {
      flex: 1;
      min-width: 180px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .gh-row-head {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 12px;
    }
    .gh-outcome-badge {
      display: inline-flex;
      align-items: center;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      line-height: 1.2;
      border: 1px solid transparent;
    }
    .gh-outcome-badge--win {
      background: #ecfdf5;
      color: #166534;
      border-color: #6ee7b7;
    }
    .gh-outcome-badge--loss {
      background: #fef2f2;
      color: #991b1b;
      border-color: #fca5a5;
    }
    .gh-outcome-badge--draw {
      background: #f8fafc;
      color: #334155;
      border-color: #cbd5e1;
    }
    .gh-result-chip {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 8px;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 0.88rem;
      font-weight: 600;
      background: #f8fafc;
      color: #1e293b;
      border: 1px solid #e2e8f0;
    }
    .gh-fav-inline {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      background: #fffbeb;
      color: #b45309;
      border: 1px solid #fcd34d;
    }
    .gh-stat-chips {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 12px;
      background: #f8fafc;
      border: 1px solid #e8edf3;
      border-radius: 10px;
      align-items: stretch;
    }
    @media (max-width: 520px) {
      .gh-stat-chips {
        grid-template-columns: 1fr;
      }
    }
    /* Played — full-width strip with colored rail */
    .gh-stat--played {
      grid-column: 1 / -1;
      display: flex;
      align-items: stretch;
      min-height: 3.1rem;
      background: #fff;
      border-radius: 8px;
      border: 1px solid #dce7f2;
      overflow: hidden;
    }
    .gh-stat-played-rail {
      width: 5px;
      flex-shrink: 0;
      background: linear-gradient(180deg, #60a5fa 0%, #2563eb 100%);
    }
    .gh-stat-played-text {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 3px;
      padding: 9px 12px;
      min-width: 0;
    }
    .gh-stat-played-label {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #2563eb;
    }
    .gh-stat-played-value {
      font-size: 0.94rem;
      font-weight: 600;
      color: #1e3a8a;
      line-height: 1.35;
      word-break: break-word;
    }
    /* Clock — horizontal capsule with icon */
    .gh-stat--clock {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      background: linear-gradient(180deg, #fffbeb 0%, #fef3c7 100%);
      border: 1px solid rgba(245, 158, 11, 0.45);
    }
    .gh-stat-clock-glyph {
      font-size: 1.2rem;
      line-height: 1;
      flex-shrink: 0;
    }
    .gh-stat-clock-lines {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .gh-stat-clock-label {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #d97706;
    }
    .gh-stat-clock-value {
      font-size: 0.88rem;
      font-weight: 700;
      color: #92400e;
      line-height: 1.25;
      word-break: break-word;
    }
    /* Moves — centered KPI number */
    .gh-stat--moves {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 8px;
      border-radius: 10px;
      background: #faf5ff;
      border: 1px dashed rgba(124, 58, 237, 0.45);
      min-height: 5.25rem;
    }
    .gh-stat-moves-value {
      font-size: 1.75rem;
      font-weight: 800;
      line-height: 1;
      color: #6d28d9;
      letter-spacing: -0.03em;
    }
    .gh-stat-moves-caption {
      margin-top: 6px;
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #7c3aed;
    }
    /* Your side — full-width bar + swatch */
    .gh-stat--side {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 8px;
    }
    .gh-stat-side-swatch {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      flex-shrink: 0;
    }
    .gh-stat-side-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .gh-stat-side-label {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .gh-stat-side-value {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.2;
    }
    .gh-stat-side--white {
      background: #fff;
      border: 1px solid #cbd5e1;
    }
    .gh-stat-side--white .gh-stat-side-swatch {
      background: linear-gradient(145deg, #ffffff, #e2e8f0);
      border: 2px solid #94a3b8;
      box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.9);
    }
    .gh-stat-side--white .gh-stat-side-label {
      color: #64748b;
    }
    .gh-stat-side--white .gh-stat-side-value {
      color: #0f172a;
    }
    .gh-stat-side--black {
      background: #1e293b;
      border: 1px solid #334155;
    }
    .gh-stat-side--black .gh-stat-side-swatch {
      background: linear-gradient(145deg, #334155, #0f172a);
      border: 2px solid #020617;
      box-shadow: inset 0 -1px 2px rgba(0, 0, 0, 0.35);
    }
    .gh-stat-side--black .gh-stat-side-label {
      color: #94a3b8;
    }
    .gh-stat-side--black .gh-stat-side-value {
      color: #f8fafc;
    }
    .game-history-row-fav {
      flex-shrink: 0;
      align-self: flex-start;
    }
    .gh-btn-favorite {
      width: 40px;
      height: 40px;
      padding: 0;
      border: none;
      border-radius: 10px;
      background: #f1f5f9;
      color: #94a3b8;
      font-size: 1.25rem;
      line-height: 1;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s ease, color 0.15s ease, transform 0.1s ease;
    }
    .gh-btn-favorite:hover {
      background: #e2e8f0;
      color: #64748b;
    }
    .gh-btn-favorite--on {
      background: #fffbeb;
      color: #d97706;
    }
    .gh-btn-favorite--on:hover {
      background: #fef3c7;
      color: #b45309;
    }
    .gh-filter-field--checkbox {
      justify-content: flex-end;
    }
    .gh-filter-checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      color: #475569;
      font-size: 0.8rem;
      cursor: pointer;
      margin-top: 1.35rem;
    }
    @media (max-width: 520px) {
      .gh-filter-field--checkbox {
        justify-content: flex-start;
      }
      .gh-filter-checkbox-label {
        margin-top: 0;
      }
    }
    .gh-filter-checkbox-label input {
      width: 1rem;
      height: 1rem;
      accent-color: #d97706;
      cursor: pointer;
    }
    .game-history-row-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .game-history-row-actions button {
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
      font-family: inherit;
    }
    .gh-btn-export {
      background: linear-gradient(135deg, #3498db, #2980b9);
      color: #fff;
    }
    .gh-btn-play {
      background: linear-gradient(135deg, #1abc9c, #16a085);
      color: #fff;
    }
    .gh-filters {
      font-family: "Inter", sans-serif;
      font-size: 0.875rem;
      margin-bottom: 16px;
      padding: 14px 16px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
    }
    .gh-filters-title {
      margin: 0 0 12px 0;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #64748b;
    }
    .gh-filters-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px 16px;
    }
    @media (max-width: 520px) {
      .gh-filters-grid {
        grid-template-columns: 1fr;
      }
    }
    .gh-filter-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }
    .gh-filter-field--wide {
      grid-column: 1 / -1;
    }
    .gh-filter-field > label {
      font-weight: 600;
      color: #475569;
      font-size: 0.8rem;
    }
    .gh-filter-hint {
      font-weight: 400;
      color: #94a3b8;
      font-size: 0.72rem;
      line-height: 1.3;
      margin-top: -2px;
    }
    .gh-filter-input,
    .gh-filter-select {
      width: 100%;
      max-width: 100%;
      padding: 8px 10px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.875rem;
      background: #fff;
      color: #334155;
      box-sizing: border-box;
    }
    .gh-filter-input:focus,
    .gh-filter-select:focus {
      outline: none;
      border-color: #3498db;
      box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.15);
    }
    .gh-filter-moves-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 12px;
    }
    .gh-filter-moves-pair {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .gh-filter-moves-pair span {
      font-size: 0.78rem;
      color: #64748b;
      font-weight: 500;
    }
    .gh-filter-moves-pair .gh-filter-input {
      width: 4.25rem;
      max-width: 5rem;
    }
    .gh-filters-actions {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #e2e8f0;
      display: flex;
      justify-content: flex-end;
    }
    .gh-btn-clear-filters {
      padding: 8px 16px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #fff;
      color: #475569;
      font-weight: 600;
      font-size: 0.82rem;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    .gh-btn-clear-filters:hover {
      background: #f1f5f9;
      border-color: #94a3b8;
    }
  </style>
</head>
<body class="gh-body">
  <nav class="gh-top-nav">
    <a href="../../chess_engine.html">← Chess vs TrifangX</a>
  </nav>
  <main class="gh-page-main">
    <div class="settings-header">
      <h2>📜 Game history</h2>
    </div>
    <p style="margin: 0 0 12px 0; color: #555; font-size: 0.9rem; font-family: 'Inter', sans-serif;">
      Up to 50 recent games vs TrifangX are kept automatically. Star a game to favorite it — favorites are never removed by the rolling limit or account stat reset.
    </p>
    <div class="gh-filters" aria-label="Filter saved games">
      <div class="gh-filters-title">Filters</div>
      <div class="gh-filters-grid">
        <div class="gh-filter-field">
          <label for="game-history-date-from">From date</label>
          <input type="date" id="game-history-date-from" class="gh-filter-input" onchange="refreshGameHistoryModal()" />
        </div>
        <div class="gh-filter-field">
          <label for="game-history-date-to">To date</label>
          <input type="date" id="game-history-date-to" class="gh-filter-input" onchange="refreshGameHistoryModal()" />
        </div>
        <div class="gh-filter-field">
          <label for="game-history-filter-outcome">Result</label>
          <select id="game-history-filter-outcome" class="gh-filter-select" onchange="refreshGameHistoryModal()">
            <option value="">Any</option>
            <option value="win">Win</option>
            <option value="loss">Loss</option>
            <option value="draw">Draw</option>
          </select>
        </div>
        <div class="gh-filter-field">
          <label for="game-history-filter-tc">Time control</label>
          <select id="game-history-filter-tc" class="gh-filter-select" onchange="refreshGameHistoryModal()">
            <option value="">Any</option>
          </select>
        </div>
        <div class="gh-filter-field gh-filter-field--checkbox">
          <label class="gh-filter-checkbox-label" for="game-history-filter-favorites-only">
            <input type="checkbox" id="game-history-filter-favorites-only" onchange="refreshGameHistoryModal()" />
            Favorites only
          </label>
        </div>
        <div class="gh-filter-field gh-filter-field--wide">
          <label for="game-history-filter-moves-min">Move count (White's full moves)</label>
          <span class="gh-filter-hint">Optional range; leave blank for no minimum or maximum.</span>
          <div class="gh-filter-moves-row">
            <div class="gh-filter-moves-pair">
              <span>Min</span>
              <input type="number" id="game-history-filter-moves-min" class="gh-filter-input" min="0" max="999" placeholder="—" onchange="refreshGameHistoryModal()" oninput="refreshGameHistoryModal()" />
            </div>
            <div class="gh-filter-moves-pair">
              <span>Max</span>
              <input type="number" id="game-history-filter-moves-max" class="gh-filter-input" min="0" max="999" placeholder="—" onchange="refreshGameHistoryModal()" oninput="refreshGameHistoryModal()" />
            </div>
          </div>
        </div>
      </div>
      <div class="gh-filters-actions">
        <button type="button" class="gh-btn-clear-filters" onclick="clearGameHistoryFilters()">Reset filters</button>
      </div>
    </div>
    <div id="game-history-list"></div>
  </main>
  <script src="../../js/chess_game_history_page.js"></script>
</body>
</html>
